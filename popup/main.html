<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>easy cookies importer</title>
        <link rel="stylesheet" href="main.css"/>
    </head>
    <body>
        <div id="popup-content">
            <div id="brand">garnajee</div>
            <h2>easy cookies importer</h2>
            <div id="buttons">
                <button id="paste-btn" class="button">Paste from clipboard</button>
                <button id="upload-btn" class="button">Upload file</button>
                <input id="file-input" type="file" accept=".txt,.json,text/plain,application/json">
            </div>
            <div id="status" role="status" aria-live="polite"></div>
        </div>
        <script src="main.js"></script>
    </body>
</html>
